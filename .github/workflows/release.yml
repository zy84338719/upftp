name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install front-end dependencies
        run: npm ci
        working-directory: ./web
        
      - name: Build front-end
        run: npm run build
        working-directory: ./web

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}

  publish-apt:
    needs: goreleaser
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --pattern "*.deb" \
            --dir ./deb-packages/

      - name: Set up APT repository
        run: |
          mkdir -p apt-repo/{pool/main/u/upftp,dists/stable/main/binary-amd64,dists/stable/main/binary-arm64}
          cp ./deb-packages/*.deb apt-repo/pool/main/u/upftp/
          
          # Generate Packages file
          cd apt-repo
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          
          # Generate Release file
          cat > dists/stable/Release << EOF
          Origin: UPFTP
          Label: UPFTP APT Repository
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: UPFTP File Sharing Server
          Date: $(date -R)
          EOF
          
          # Generate InRelease (signing would require GPG key)
          cd dists/stable
          cat Release > InRelease

      - name: Upload APT repository to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          destination_dir: apt
          keep_files: true

  announce:
    needs: [goreleaser, publish-apt]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Get version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Create announcement
        run: |
          echo "## 🎉 UPFTP v${VERSION} Released!" > announcement.md
          echo "" >> announcement.md
          echo "### Installation" >> announcement.md
          echo "" >> announcement.md
          echo "**macOS (Homebrew):**" >> announcement.md
          echo "\`\`\`bash" >> announcement.md
          echo "brew tap zy84338719/tap" >> announcement.md
          echo "brew install upftp" >> announcement.md
          echo "\`\`\`" >> announcement.md
          echo "" >> announcement.md
          echo "**Ubuntu/Debian:**" >> announcement.md
          echo "\`\`\`bash" >> announcement.md
          echo "# Add APT repository" >> announcement.md
          echo "curl -fsSL https://zy84338719.github.io/upftp/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/upftp.gpg" >> announcement.md
          echo "echo 'deb [signed-by=/etc/apt/trusted.gpg.d/upftp.gpg] https://zy84338719.github.io/upftp/apt stable main' | sudo tee /etc/apt/sources.list.d/upftp.list" >> announcement.md
          echo "sudo apt update && sudo apt install upftp" >> announcement.md
          echo "\`\`\`" >> announcement.md
          echo "" >> announcement.md
          echo "See full release notes: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> announcement.md

      - name: Display announcement
        run: cat announcement.md
