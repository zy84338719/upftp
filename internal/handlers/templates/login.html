<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPFTP - 登录</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">📁</div>
            <h1>UPFTP</h1>
            <p>安全文件共享服务器</p>
        </div>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">👤 用户名</label>
                <div class="input-icon">
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">🔒 密码</label>
                <div class="input-icon">
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">记住我的登录状态</label>
            </div>

            <button type="submit" id="loginBtn">
                <span id="loginText">登录</span>
                <div id="loginLoading" class="loading">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>

        <div class="footer">
            <p>🔒 您的连接是安全的</p>
            <p style="margin-top: 8px;">
                <a href="https://github.com/zy84338719/upftp" target="_blank">UPFTP</a> · 
                <span id="version">{{.Version}}</span>
            </p>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
