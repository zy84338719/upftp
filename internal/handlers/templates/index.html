<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPFTP - File Sharing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F9FA; color: #1a1a1a; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e5e5; padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-mark { width: 28px; height: 28px; background: #D97706; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; border-radius: 6px; }
        .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; }
        .nav-section { display: flex; flex-direction: column; gap: 4px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; color: #666; font-size: 13px; font-weight: 500; transition: all .15s; }
        .nav-item:hover { background: #f5f5f5; color: #333; }
        .nav-item.active { background: #D97706; color: #fff; }
        .lang-switch { margin-top: auto; display: flex; gap: 4px; background: #f0f0f0; border-radius: 6px; padding: 3px; }
        .lang-btn { flex: 1; padding: 6px 0; text-align: center; border: none; background: transparent; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; color: #999; transition: all .15s; }
        .lang-btn.active { background: #fff; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

        .tree-section { flex: 1; min-height: 0; display: flex; flex-direction: column; }
        .tree-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; padding: 0 12px 8px; }
        .tree-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .tree-body::-webkit-scrollbar { width: 4px; }
        .tree-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .tree-node { display: flex; align-items: center; gap: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background .1s; border-radius: 4px; margin: 1px 6px; }
        .tree-node:hover { background: #f0f0f0; color: #222; }
        .tree-node.active { background: #FEF3C7; color: #92400E; font-weight: 600; }
        .tree-arrow { width: 14px; text-align: center; font-size: 9px; color: #bbb; flex-shrink: 0; transition: transform .15s; }
        .tree-arrow.open { transform: rotate(90deg); }
        .tree-icon { flex-shrink: 0; font-size: 14px; }
        .tree-label { overflow: hidden; text-overflow: ellipsis; }
        .tree-children { display: none; }
        .tree-children.open { display: block; }
        .tree-loading { padding: 8px 12px; font-size: 11px; color: #ccc; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .header { padding: 24px 32px; border-bottom: 1px solid #e5e5e5; display: flex; justify-content: space-between; align-items: center; gap: 16px; background: #fff; flex-shrink: 0; }
        .header-left { min-width: 0; }
        .breadcrumb { font-size: 13px; color: #999; margin-bottom: 4px; }
        .breadcrumb a { color: #999; text-decoration: none; }
        .breadcrumb a:hover { color: #333; }
        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-right { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        .search { padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; width: 260px; outline: none; transition: border .15s; }
        .search:focus { border-color: #999; }
        .btn-upload { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: #D97706; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
        .btn-upload:hover { background: #B45309; }

        .content { flex: 1; overflow-y: auto; background: #fff; }
        .table-head { display: grid; grid-template-columns: 1fr 100px 160px 260px; padding: 10px 32px; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #999; position: sticky; top: 0; background: #fff; z-index: 1; }
        .file-row { display: grid; grid-template-columns: 1fr 100px 160px 260px; padding: 12px 32px; border-bottom: 1px solid #f5f5f5; align-items: center; font-size: 13px; transition: background .1s; }
        .file-row:hover { background: #fafafa; }
        .file-name-cell { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .file-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .file-name { font-weight: 500; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-name:hover { color: #D97706; }
        .file-size { color: #888; }
        .file-date { color: #888; }
        .file-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .act-btn { padding: 4px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-size: 11px; font-weight: 500; cursor: pointer; transition: all .15s; color: #555; }
        .act-btn:hover { background: #333; color: #fff; border-color: #333; }

        .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: #bbb; }
        .empty svg { width: 48px; height: 48px; margin-bottom: 12px; }
        .empty p { font-size: 14px; }

        /* Preview Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; width: 90vw; max-width: 900px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .modal-title { font-size: 15px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border: none; background: #f5f5f5; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
        .modal-close:hover { background: #e0e0e0; }
        .modal-body { flex: 1; overflow: auto; padding: 20px; min-height: 200px; }
        .modal-body pre { white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; line-height: 1.6; color: #333; }
        .modal-body img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; }
        .modal-body video, .modal-body audio { width: 100%; }
        .modal-body .loading { text-align: center; padding: 40px; color: #bbb; }
        .modal-body .error { text-align: center; padding: 40px; color: #D97706; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; z-index: 2000; }
        .toast.show { display: block; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .table-head { display: none; }
            .file-row { grid-template-columns: 1fr auto; }
            .file-size, .file-date { display: none; }
            .header { flex-direction: column; align-items: stretch; }
            .header-right { flex-direction: column; }
            .search { width: 100%; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-mark">U</div>
            <span class="logo-text">UPFTP</span>
        </div>
        <nav class="nav-section">
            <a href="javascript:navigateTo('/')" class="nav-item active" id="navFiles">
                <span>&#128193;</span> <span data-i18n="all_files">All Files</span>
            </a>
        </nav>
        <div class="tree-section">
            <div class="tree-header">
                <span data-i18n="explorer">EXPLORER</span>
            </div>
            <div class="tree-body" id="fileTree">
                <div class="tree-loading">...</div>
            </div>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" id="langEN" onclick="setLang('en')">EN</button>
            <button class="lang-btn" id="langZH" onclick="setLang('zh')">中文</button>
        </div>
    </aside>

    <main class="main">
        <div class="header">
            <div class="header-left">
                <div class="breadcrumb" id="breadcrumb"></div>
                <h1 class="page-title" id="pageTitle">All Files</h1>
            </div>
            <div class="header-right">
                <input type="text" class="search" data-i18n-placeholder="search" placeholder="Search files..." id="searchInput" oninput="onSearch(this.value)">
                <button class="btn-upload" onclick="doUpload()">
                    &#8593; <span data-i18n="upload">Upload</span>
                </button>
            </div>
        </div>
        <div class="content" id="content">
            <div class="table-head">
                <div data-i18n="name">Name</div>
                <div data-i18n="size">Size</div>
                <div data-i18n="modified">Modified</div>
                <div style="text-align:right" data-i18n="actions">Actions</div>
            </div>
            <div id="fileListBody"></div>
        </div>
    </main>

    <div class="modal-overlay" id="previewModal" onclick="if(event.target===this)closePreview()">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="previewTitle">Preview</div>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="modal-body" id="previewBody">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal" onclick="if(event.target===this)closeQR()">
        <div class="modal" style="max-width:360px;">
            <div class="modal-header">
                <div class="modal-title" id="qrTitle">QR Download</div>
                <button class="modal-close" onclick="closeQR()">&times;</button>
            </div>
            <div class="modal-body" style="text-align:center;padding:24px;">
                <img id="qrImage" src="" alt="QR" style="max-width:240px;margin:0 auto 16px;display:block;" />
                <div id="qrLink" style="font-size:12px;color:#888;word-break:break-all;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    var LANG = {
        en: { all_files:"All Files", name:"Name", size:"Size", modified:"Modified", actions:"Actions",
              search:"Search files...", upload:"Upload", copy_link:"Copy Link", download:"Download",
              preview:"Preview", empty:"This folder is empty", root:"Root", loading:"Loading...",
              preview_err:"Preview not available", copied:"Link copied!", explorer:"EXPLORER",
              qr_download:"QR Download", qr_title:"Scan to Download", zip_download:"ZIP Download" },
        zh: { all_files:"所有文件", name:"文件名", size:"大小", modified:"修改时间", actions:"操作",
              search:"搜索文件...", upload:"上传", copy_link:"复制链接", download:"下载",
              preview:"预览", empty:"此文件夹为空", root:"根目录", loading:"加载中...",
              preview_err:"无法预览此文件", copied:"链接已复制！", explorer:"文件树",
              qr_download:"二维码下载", qr_title:"扫码下载", zip_download:"打包下载" }
    };
    var curLang = localStorage.getItem('upftp-lang') || 'en';
    var allFiles = [];
    var curPath = '/';
    var treeData = null;

    function T(k) { return (LANG[curLang] || LANG.en)[k] || k; }

    function navigateTo(path) {
        curPath = path;
        window.history.pushState({path: path}, '', path === '/' ? '/' : path);
        fetch('/api/files?path=' + encodeURIComponent(path)).then(function(r) { return r.json(); }).then(function(data) {
            if (data.files) {
                allFiles = data.files;
                curPath = data.path || path;
                updateBreadcrumb();
                render(allFiles);
                updateTreeActive();
                document.getElementById('searchInput').value = '';
            }
        });
    }

    function updateTreeActive() {
        var nodes = document.querySelectorAll('.tree-node');
        for (var i = 0; i < nodes.length; i++) {
            var p = nodes[i].getAttribute('data-path');
            if (p === curPath) {
                nodes[i].classList.add('active');
            } else {
                nodes[i].classList.remove('active');
            }
        }
    }

    function loadTree() {
        fetch('/api/tree').then(function(r) { return r.json(); }).then(function(data) {
            treeData = data;
            var container = document.getElementById('fileTree');
            container.innerHTML = '';
            renderTreeNode(container, data, 0);
        }).catch(function() {
            document.getElementById('fileTree').innerHTML = '<div class="tree-loading">~</div>';
        });
    }

    function renderTreeNode(parent, node, depth) {
        var row = document.createElement('div');
        row.className = 'tree-node' + (node.path === curPath ? ' active' : '');
        row.style.paddingLeft = (8 + depth * 14) + 'px';
        row.setAttribute('data-path', node.path);

        var arrow = document.createElement('span');
        arrow.className = 'tree-arrow';
        var hasChildren = node.children && node.children.length > 0;
        if (hasChildren) {
            arrow.textContent = '\u25B6';
            var isOpen = curPath === node.path || curPath.indexOf(node.path + '/') === 0;
            if (isOpen) arrow.classList.add('open');
        }

        var icon = document.createElement('span');
        icon.className = 'tree-icon';
        icon.textContent = '\uD83D\uDCC1';

        var label = document.createElement('span');
        label.className = 'tree-label';
        label.textContent = node.name || '/';

        row.appendChild(arrow);
        row.appendChild(icon);
        row.appendChild(label);
        parent.appendChild(row);

        if (hasChildren) {
            var childContainer = document.createElement('div');
            childContainer.className = 'tree-children';
            var isOpen = curPath === node.path || curPath.indexOf(node.path + '/') === 0;
            if (isOpen) childContainer.classList.add('open');

            for (var i = 0; i < node.children.length; i++) {
                renderTreeNode(childContainer, node.children[i], depth + 1);
            }
            parent.appendChild(childContainer);

            (function(a, cc, p) {
                row.onclick = function(e) {
                    e.stopPropagation();
                    var isExpanded = cc.classList.contains('open');
                    if (isExpanded) {
                        a.classList.remove('open');
                        cc.classList.remove('open');
                    } else {
                        a.classList.add('open');
                        cc.classList.add('open');
                    }
                    navigateTo(p);
                };
            })(arrow, childContainer, node.path);
        } else {
            row.onclick = function(e) {
                e.stopPropagation();
                navigateTo(node.path);
            };
        }
    }

    function setLang(lang) {
        curLang = lang;
        localStorage.setItem('upftp-lang', lang);
        document.getElementById('langEN').className = 'lang-btn' + (lang==='en'?' active':'');
        document.getElementById('langZH').className = 'lang-btn' + (lang==='zh'?' active':'');
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var k = el.getAttribute('data-i18n');
            if (LANG[lang][k]) el.textContent = LANG[lang][k];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
            var k = el.getAttribute('data-i18n-placeholder');
            if (LANG[lang][k]) el.placeholder = LANG[lang][k];
        });
        updateBreadcrumb();
        render(allFiles);
    }

    function updateBreadcrumb() {
        var el = document.getElementById('breadcrumb');
        var titleEl = document.getElementById('pageTitle');
        if (curPath === '/') {
            el.innerHTML = '<a href="javascript:navigateTo(\'/\')">/' + T('root') + '</a>';
            titleEl.textContent = T('all_files');
        } else {
            var parts = curPath.split('/').filter(Boolean);
            var html = '<a href="javascript:navigateTo(\'/\')">/</a>';
            var acc = '';
            for (var i = 0; i < parts.length; i++) {
                acc += '/' + parts[i];
                if (i < parts.length - 1) {
                    html += ' <a href="javascript:navigateTo(\'' + acc + '\')">' + parts[i] + '</a> / ';
                } else {
                    html += ' ' + parts[i];
                }
            }
            el.innerHTML = html;
            titleEl.textContent = parts[parts.length - 1];
        }
    }

    function getIcon(name, isDir) {
        if (isDir) return '&#128193;';
        var ext = (name.split('.').pop() || '').toLowerCase();
        var map = {jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',webp:'🖼️',
            mp4:'🎬',avi:'🎬',mov:'🎬',mkv:'🎬',webm:'🎬',
            mp3:'🎵',wav:'🎵',flac:'🎵',ogg:'🎵',m4a:'🎵',
            pdf:'📄',doc:'📄',docx:'📄',xls:'📄',xlsx:'📄',ppt:'📄',pptx:'📄',
            zip:'📦',rar:'📦','7z':'📦',tar:'📦',gz:'📦',
            js:'💻',ts:'💻',py:'💻',go:'💻',html:'💻',css:'💻',sh:'💻',java:'💻',c:'💻',cpp:'💻',rs:'💻',
            txt:'📝',md:'📝',json:'📝',yaml:'📝',yml:'📝',xml:'📝',csv:'📝',log:'📝',toml:'📝'};
        return map[ext] || '📄';
    }

    function render(files) {
        allFiles = files;
        var body = document.getElementById('fileListBody');
        if (!files || files.length === 0) {
            body.innerHTML = '<div class="empty"><p>' + T('empty') + '</p></div>';
            return;
        }
        var h = '';
        for (var i = 0; i < files.length; i++) {
            var f = files[i];
            var icon = getIcon(f.Name, f.IsDir);
            var click = f.IsDir
                ? 'navigateTo(\'' + escHtml(f.Path) + '\')'
                : '';
            h += '<div class="file-row">';
            h += '<div class="file-name-cell">';
            h += '<span class="file-icon">' + icon + '</span>';
            h += '<span class="file-name" onclick="' + click + '">' + escHtml(f.Name) + '</span>';
            h += '</div>';
            h += '<div class="file-size">' + escHtml(f.Size || '') + '</div>';
            h += '<div class="file-date">' + escHtml(f.ModTime || '') + '</div>';
            h += '<div class="file-actions">';
            h += '<button class="act-btn" onclick="copyLink(&#39;' + escHtml(f.Path) + '&#39;)">' + T('copy_link') + '</button>';
            if (f.IsDir) {
                h += '<button class="act-btn" onclick="dlFile(&#39;' + escHtml(f.Path) + '&#39;)">' + T('zip_download') + '</button>';
            } else {
                h += '<button class="act-btn" onclick="dlFile(&#39;' + escHtml(f.Path) + '&#39;)">' + T('download') + '</button>';
            }
            h += '<button class="act-btn" onclick="showQR(&#39;' + escHtml(f.Path) + '&#39;)">' + T('qr_download') + '</button>';
            if (f.CanPreview && !f.IsDir) {
                h += '<button class="act-btn" onclick="showPreview(&#39;' + escHtml(f.Path) + '&#39;,&#39;' + escHtml(f.Name) + '&#39;,' + f.FileType + ')">' + T('preview') + '</button>';
            }
            h += '</div></div>';
        }
        body.innerHTML = h;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function copyLink(path) {
        var url = window.location.origin + '/download/' + path;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(function(){ toast(T('copied')); });
        } else {
            var ta = document.createElement('textarea'); ta.value = url;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta); toast(T('copied'));
        }
    }

    function dlFile(path) {
        var a = document.createElement('a');
        a.href = '/download/' + path; a.click();
    }

    function showQR(path) {
        var url = window.location.origin + '/download/' + path;
        document.getElementById('qrTitle').textContent = T('qr_title');
        document.getElementById('qrImage').src = '/api/qrcode?url=' + encodeURIComponent(url);
        document.getElementById('qrLink').textContent = url;
        document.getElementById('qrModal').classList.add('show');
    }

    function closeQR() {
        document.getElementById('qrModal').classList.remove('show');
    }

    function showPreview(path, name, fileType) {
        var modal = document.getElementById('previewModal');
        var body = document.getElementById('previewBody');
        var title = document.getElementById('previewTitle');
        title.textContent = name;
        body.innerHTML = '<div class="loading">' + T('loading') + '</div>';
        modal.classList.add('show');

        var url = path;
        // fileType: 1=image, 2=text, 4=video, 5=audio, 8=code
        if (fileType === 1) {
            body.innerHTML = '<img src="' + url + '" alt="" onerror="previewErr()">';
        } else if (fileType === 4) {
            body.innerHTML = '<video controls src="' + url + '" onerror="previewErr()"></video>';
        } else if (fileType === 5) {
            body.innerHTML = '<audio controls src="' + url + '" onerror="previewErr()" style="width:100%"></audio>';
        } else {
            // text/code: fetch content
            fetch(url).then(function(r) {
                if (!r.ok) throw new Error('fetch failed');
                return r.text();
            }).then(function(text) {
                body.innerHTML = '<pre>' + escHtml(text) + '</pre>';
            }).catch(function() {
                previewErr();
            });
        }
    }

    function previewErr() {
        document.getElementById('previewBody').innerHTML = '<div class="error">' + T('preview_err') + '</div>';
    }

    function closePreview() {
        document.getElementById('previewModal').classList.remove('show');
        document.getElementById('previewBody').innerHTML = '';
    }

    function doUpload() {
        var input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        input.onchange = function(e) {
            var fd = new FormData();
            fd.append('path', curPath);
            for (var i = 0; i < e.target.files.length; i++) fd.append('files', e.target.files[i]);
            fetch('/api/upload', {method:'POST', body:fd}).then(function(r) {
                if (r.ok) navigateTo(curPath);
            });
        };
        input.click();
    }

    function onSearch(q) {
        var rows = document.querySelectorAll('.file-row');
        var ql = q.toLowerCase();
        for (var i = 0; i < rows.length; i++) {
            var name = rows[i].querySelector('.file-name').textContent.toLowerCase();
            rows[i].style.display = name.indexOf(ql) >= 0 ? 'grid' : 'none';
        }
    }

    function toast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg; el.classList.add('show');
        setTimeout(function(){ el.classList.remove('show'); }, 2500);
    }

    document.addEventListener('DOMContentLoaded', function() {
        allFiles = {{.Files | json}};
        curPath = {{.CurrentPath}};
        setLang(curLang);
        updateBreadcrumb();
        render(allFiles);
        loadTree();
    });

    window.addEventListener('popstate', function(e) {
        if (e.state && e.state.path) {
            navigateTo(e.state.path);
        }
    });
    </script>
</body>
</html>
