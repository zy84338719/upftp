<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPFTP - File Sharing</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-mark">U</div>
            <span class="logo-text">UPFTP</span>
        </div>
        <nav class="nav-section">
            <a href="javascript:navigateTo('/')" class="nav-item active" id="navFiles">
                <span>&#128193;</span> <span data-i18n="all_files">All Files</span>
            </a>
        </nav>
        <div class="tree-section">
            <div class="tree-header">
                <span data-i18n="explorer">EXPLORER</span>
            </div>
            <div class="tree-body" id="fileTree">
                <div class="tree-loading">...</div>
            </div>
        </div>
        <div class="sidebar-bottom">
            <button class="settings-btn" onclick="openSettings()">
                <span>&#9881;</span> <span data-i18n="settings">Settings</span>
            </button>
            <div class="lang-switch">
                <button class="lang-btn active" id="langEN" onclick="setLang('en')">EN</button>
                <button class="lang-btn" id="langZH" onclick="setLang('zh')">中文</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="header">
            <div class="header-left">
                <div class="breadcrumb" id="breadcrumb"></div>
                <h1 class="page-title" id="pageTitle">All Files</h1>
            </div>
            <div class="header-right">
                <input type="text" class="search" data-i18n-placeholder="search" placeholder="Search files..." id="searchInput" oninput="onSearch(this.value)">
                <button class="btn-upload" onclick="doUpload()">
                    &#8593; <span data-i18n="upload">Upload</span>
                </button>
            </div>
        </div>
        <div class="content" id="content">
            <div class="table-head">
                <div data-i18n="name">Name</div>
                <div data-i18n="size">Size</div>
                <div data-i18n="modified">Modified</div>
                <div style="text-align:right" data-i18n="actions">Actions</div>
            </div>
            <div id="fileListBody"></div>
        </div>
    </main>

    <div class="modal-overlay" id="previewModal" onclick="if(event.target===this)closePreview()">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="previewTitle">Preview</div>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="modal-body" id="previewBody">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal" onclick="if(event.target===this)closeQR()">
        <div class="modal" style="max-width:360px;">
            <div class="modal-header">
                <div class="modal-title" id="qrTitle">QR Download</div>
                <button class="modal-close" onclick="closeQR()">&times;</button>
            </div>
            <div class="modal-body" style="text-align:center;padding:24px;">
                <img id="qrImage" src="" alt="QR" style="max-width:240px;margin:0 auto 16px;display:block;" />
                <div id="qrLink" style="font-size:12px;color:#888;word-break:break-all;"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
        <div class="modal settings-modal">
            <div class="modal-header">
                <div class="modal-title" id="settingsTitle">Settings</div>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <div class="settings-section-title" id="stLangTitle">Language</div>
                    <div class="settings-row">
                        <span class="settings-label" id="stLangLabel">Interface Language</span>
                        <div class="lang-switch" style="width:120px;">
                            <button class="lang-btn active" id="sLangEN" onclick="setLang('en')">EN</button>
                            <button class="lang-btn" id="sLangZH" onclick="setLang('zh')">中文</button>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">HTTP Authentication</div>
                    <div class="settings-row">
                        <span class="settings-label">Enable</span>
                        <button class="settings-toggle" id="httpAuthToggle" onclick="toggleHttpAuth()"></button>
                    </div>
                    <div id="httpAuthFields" style="display:none;">
                        <div class="settings-row">
                            <span class="settings-label">Username</span>
                            <input type="text" class="settings-input" id="httpAuthUser" placeholder="admin">
                        </div>
                        <div class="settings-row">
                            <span class="settings-label">Password</span>
                            <input type="password" class="settings-input" id="httpAuthPass" placeholder="password">
                        </div>
                        <div class="settings-row">
                            <span></span>
                            <button class="settings-save" onclick="saveHttpAuth()" id="btnSaveHttpAuth">Save</button>
                        </div>
                        <div class="settings-status" id="httpAuthStatus"></div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">FTP Credentials</div>
                    <div class="settings-row">
                        <span class="settings-label">Username</span>
                        <input type="text" class="settings-input" id="ftpUser" placeholder="admin">
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Password</span>
                        <input type="password" class="settings-input" id="ftpPass" placeholder="password">
                    </div>
                    <div class="settings-row">
                        <span></span>
                        <button class="settings-save" onclick="saveFTP()" id="btnSaveFTP">Save</button>
                    </div>
                    <div class="settings-status" id="ftpStatus"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    window.__UPFTP_CONFIG__ = {
        language: '{{.Language}}',
        httpAuthOn: {{.HTTPAuthOn}},
        httpAuthUser: '{{.HTTPAuthUser}}',
        httpAuthPass: '{{.HTTPAuthPass}}',
        files: {{.Files | json}},
        currentPath: {{.CurrentPath}}
    };
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
