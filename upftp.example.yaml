# ╔════════════════════════════════════════════════════════════════╗
# ║                    UPFTP Configuration File                    ║
# ║            https://github.com/zy84338719/upftp                 ║
# ╚════════════════════════════════════════════════════════════════╝

# ────────────────────────────────────────────────────────────────
# 🌐 Server Settings
# ────────────────────────────────────────────────────────────────
# HTTP server port (default: 12345)
port: "12345"

# FTP server port (default: 12348, only used when enable_ftp is true)
ftp_port: "12348"

# WebDAV server port (default: 12346, only used when enable_webdav is true)
webdav_port: "12346"

# NFS server port (default: 12347, only used when enable_nfs is true)
nfs_port: "12347"

# Root directory to share (use "./" for current directory)
root: "./"

# Auto-select network interface (true = first available, false = manual selection)
auto_select: false

# Enable FTP server (requires ftp_port)
enable_ftp: false

# Enable MCP (Model Context Protocol) for AI integration (Claude Desktop)
enable_mcp: false

# Enable WebDAV server (requires webdav_port)
enable_webdav: false

# Enable NFS server (requires nfs_port)
enable_nfs: false

# ────────────────────────────────────────────────────────────────
# 🔐 FTP Credentials
# ────────────────────────────────────────────────────────────────
# Default credentials for FTP access
username: "admin"
password: "admin"

# ────────────────────────────────────────────────────────────────
# 🔒 HTTP Basic Authentication
# ────────────────────────────────────────────────────────────────
# Protect web interface with username/password
http_auth:
  enabled: false
  username: "admin"
  password: "admin123"

# ────────────────────────────────────────────────────────────────
# 🔒 HTTPS Settings
# ────────────────────────────────────────────────────────────────
# Enable HTTPS with custom SSL certificates
# To enable: generate certs with 'openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes'
https:
  enabled: false
  cert_file: "/path/to/cert.pem"
  key_file: "/path/to/key.pem"

# ────────────────────────────────────────────────────────────────
# 📝 Logging Settings
# ────────────────────────────────────────────────────────────────
logging:
  level: "info"      # Options: debug, info, warn, error
  format: "text"     # Options: text (colored), json (machine-readable)

# ────────────────────────────────────────────────────────────────
# 📤 Upload Settings
# ────────────────────────────────────────────────────────────────
# Allow file uploads through web interface
upload:
  enabled: true
  max_size: 104857600  # 100MB in bytes (104857600 = 100MB, 52428800 = 50MB, 10485760 = 10MB)
  allow_types: ""      # Allowed file extensions (empty = all types, or ".jpg,.png,.pdf,.zip")

# ────────────────────────────────────────────────────────────────
# 📚 Advanced Usage Examples
# ────────────────────────────────────────────────────────────────
# Example 1: Basic file server
#   port: "8080"
#   root: "/home/user/shared"
#   enable_ftp: false
#
# Example 2: Secure server with auth
#   http_auth:
#     enabled: true
#     username: "myuser"
#     password: "mypassword123"
#
# Example 3: FTP + HTTP with upload
#   enable_ftp: true
#   upload:
#     enabled: true
#     max_size: 524288000  # 500MB
