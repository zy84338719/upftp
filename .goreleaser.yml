version: 1

project_name: upftp
builds:
  - id: upftp
    main: ./cmd/server/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - 386
    ignore:
      - goos: darwin
        goarch: 386
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.LastCommit={{.ShortCommit}}
      - -X main.BuildDate={{.Date}}
    binary: upftp
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: upftp-archive
    builds:
      - upftp
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE.txt
      - upftp.example.yaml
    wrap_in_directory: true

nfpms:
  - id: upftp
    builds:
      - upftp
    package_name: upftp
    vendor: Zhang Yi
    homepage: https://github.com/zy84338719/upftp
    maintainer: Zhang Yi <zy84338719@gmail.com>
    description: Modern cross-platform file sharing server with HTTP and FTP support
    license: MIT
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    section: net
    priority: optional
    file_name_template: "{{ .ConventionalFileName }}"
    contents:
      - src: packaging/systemd/upftp.service
        dst: /etc/systemd/system/upftp.service
      - src: packaging/config/upftp.conf
        dst: /etc/upftp/upftp.conf
        type: config|noreplace
      - src: upftp.example.yaml
        dst: /etc/upftp/upftp.example.yaml
    scripts:
      postinstall: packaging/debian/postinst
      preremove: packaging/debian/prerm
      postremove: packaging/debian/postrm
    recommends:
      - systemd
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package
    rpm:
      signature:
        disable: true

brews:
  - name: upftp
    repository:
      owner: zy84338719
      name: homebrew-tap
    folder: Formula
    homepage: https://github.com/zy84338719/upftp
    description: Modern cross-platform file sharing server with HTTP and FTP support
    license: MIT
    skip_upload: false
    install: |-
      bin.install "upftp"
      
      # Create configuration directory
      (buildpath/"upftp.example.yaml").write_file
      etc.install "upftp.example.yaml" => "upftp/upftp.example.yaml"
    service: |-
      run [opt_bin/"upftp", "-auto", "-d", var/"upftp"]
      keep_alive true
      log_path var/"log/upftp.log"
      error_log_path var/"log/upftp.error.log"
      working_dir var/"upftp"
    test: |-
      system "#{bin}/upftp", "-h"

scoops:
  - bucket:
      owner: zy84338719
      name: scoop-bucket
    folder: bucket
    homepage: https://github.com/zy84338719/upftp
    description: Modern cross-platform file sharing server with HTTP and FTP support
    license: MIT
    persist:
      - data
      - config
    post_install: |
      # Create example configuration file
      New-Item -ItemType Directory -Path "$env:SCOOP\apps\upftp\current\config" -Force | Out-Null
      Copy-Item -Path "$env:SCOOP\apps\upftp\current\upftp.example.yaml" -Destination "$env:SCOOP\apps\upftp\current\config\upftp.yaml" -Force

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Snapshot configuration
snapshot:
  name_template: "{{ incpatch .Version }}-next-{{ .ShortCommit }}"

# Changelog configuration
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - merge conflict
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: '🚀 Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: '🐛 Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: '📝 Documentation'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: '🔧 Maintenance'
      regexp: "^.*chore[(\\w)]*:+.*$"
      order: 3
    - title: '🔄 CI/CD'
      regexp: "^.*ci[(\\w)]*:+.*$"
      order: 4
    - title: '🔧 Others'
      order: 999

# Release configuration
release:
  github:
    owner: zy84338719
    name: upftp
  draft: false
  prerelease: auto
  discussion_category_name: releases
  extra_files:
    - glob: ./upftp.example.yaml
  footer: |
    ## Installation
    
    ### macOS (Homebrew)
    ```bash
    brew tap zy84338719/tap
    brew install upftp
    ```
    
    ### Ubuntu/Debian
    ```bash
    # Download .deb from assets below
    sudo dpkg -i upftp_*.deb
    sudo systemctl enable upftp
    sudo systemctl start upftp
    ```
    
    ### CentOS/RHEL/Fedora
    ```bash
    # Download .rpm from assets below
    sudo rpm -i upftp-*.rpm
    sudo systemctl enable upftp
    sudo systemctl start upftp
    ```
    
    ### Windows (Scoop)
    ```powershell
    scoop bucket add zy84338719 https://github.com/zy84338719/scoop-bucket
    scoop install upftp
    ```
    
    ### Manual
    Download the binary for your platform from the assets below.

    Full documentation: https://github.com/zy84338719/upftp#readme

# Before hooks
before:
  hooks:
    - go mod tidy
    - go mod download

# After hooks
after:
  hooks:
    - echo "Release completed successfully!"

